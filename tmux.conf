# Enable true color / terminal compatibility
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256color:Tc"

# Act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+
bind-key b last-window

# Start window numbers at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing
set -g renumber-windows on

# Remove administrative debris in status bar
set -g status-left ''
set -g status-right '#[fg=colour216]%I:%M %p '

# Increase scrollback
set -g history-limit 10000

# Prefix -> back-one-character
bind-key C-b send-prefix

# Don't suspend client
unbind-key C-z

# Set 0 delay when ESC is pressed in tmux
set -sg escape-time 0

# Split window to the right / bottom
bind-key right split-window -h
bind-key down  split-window -v

# Clear screen using prefix + Ctrl-k
bind-key -r C-k send-keys -R \; send-keys C-l \; clear-history

# Use Ctrl-Shift-Arrow to move windows left/right
bind -n C-S-Left  swap-window -t -1 \; select-window -t -1
bind -n C-S-Right swap-window -t +1 \; select-window -t +1

# Refresh status every minute
set -g status-interval 60

# Enable mouse
set -g mouse on

# Mimic Vim selection-yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi r send -X rectangle-selection

##### Theme configuration #####

# Customizable day/night boundaries
set -g @morning_hour "7"
set -g @evening_hour "18"

# Set Catppuccin flavor based on current hour
if-shell 'hour=$(date +%H); [ "$hour" -ge "#{@morning_hour}" ] && [ "$hour" -lt "#{@evening_hour}" ]' \
  'set -g @catppuccin_flavor "latte"' \
  'set -g @catppuccin_flavor "frappe"'

# Catppuccin options
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W#F"
set -g @catppuccin_window_current_text " #W#F"
set -g @catppuccin_window_number "#I:"
set -g @catppuccin_window_current_number "#I:"

# Local config
if-shell "[ -f ~/.tmux.conf.local ]" "source ~/.tmux.conf.local"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux#v2.1.3'

run '~/.tmux/plugins/tpm/tpm'
